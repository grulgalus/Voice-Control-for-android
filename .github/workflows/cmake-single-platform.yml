name: Build Geode Mod

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Android 32-bit
            os: ubuntu-22.04
            target: Android32
          - name: Android 64-bit
            os: ubuntu-22.04
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      # STÁHNE FUNKČNÍ NDK (PŘEDEŠLÁ VERZE)
      - name: Setup Android NDK r26d
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "NDK_PATH=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        env:
          ANDROID_NDK_ROOT: ${{ env.NDK_PATH }}
        with:
          target: ${{ matrix.config.target }}

  package:
    name: Package Geode Mod
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Combine build artifacts
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
