name: Build Geode Mod

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Android 32-bit
            os: ubuntu-latest
            target: Android32
          - name: Android 64-bit
            os: ubuntu-latest
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      # TENTO KROK nainstaluje Ninju, který ti v logu chyběl
      - name: Install Ninja
        run: sudo apt-get install ninja-build

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          bindings: geode-sdk/bindings
          bindings-ref: main
          target: ${{ matrix.config.target }}
          # Smazal jsem tu pevnou verzi NDK, která neexistovala. 
          # Action si teď najde výchozí Android NDK v systému sama.

  package:
    name: Package Geode Mod
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Combine build artifacts
        uses: geode-sdk/build-geode-mod@main
        with:
          bindings: geode-sdk/bindings
          bindings-ref: main
          combine: true
